<section class="relative overflow-hidden bg-gradient-to-b from-teal-50 to-white py-32 px-6">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-[-5%] right-[-5%] w-72 h-72 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
    </div>

    <div class="relative z-10 max-w-4xl mx-auto text-center">
        <span class="inline-block py-1 px-3 mb-6 text-sm font-semibold text-teal-700 bg-teal-100 rounded-full animate-fade-in-down">
            {{ 'HERO.BADGE' | translate }}
        </span>

        <h1 class="text-4xl md:text-6xl font-extrabold text-gray-900 tracking-tight leading-tight animate-fade-in-up">
            {{ 'HERO.TITLE_PART1' | translate }} <br/>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-teal-600 to-emerald-500">
                {{ 'HERO.TITLE_PART2' | translate }}
            </span>
        </h1>

        <p class="mt-8 text-lg md:text-xl text-gray-600 max-w-2xl mx-auto leading-relaxed animate-fade-in-up delay-200">
            {{ 'HERO.DESCRIPTION' | translate }}
        </p>

        <div class="mt-10 flex flex-col sm:flex-row justify-center gap-4 animate-fade-in-up delay-300">
            <button (click)="goToCTA()" class="group relative cursor-pointer overflow-hidden bg-teal-600 text-white px-10 py-4 rounded-full font-bold text-lg shadow-lg shadow-teal-200 hover:shadow-teal-400 transition-all duration-300 hover:-translate-y-1">
                <span class="relative z-10">{{ 'HERO.BTN_START' | translate }}</span>
                <div class="absolute inset-0 bg-teal-700 translate-y-[100%] group-hover:translate-y-0 transition-transform duration-300"></div>
            </button>
            
            <button class="px-10 py-4 rounded-full font-bold text-lg text-gray-700 border border-gray-200 hover:bg-gray-50 transition-all">
                {{ 'HERO.BTN_LEARN' | translate }}
            </button>
        </div>
    </div>
</section>
